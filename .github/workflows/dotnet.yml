name: GITHUB PACKAGES DEPLOYMENT

on:
  push:
    branches: [ "main"]
env:
    discord_webhook: https://discord.com/api/webhooks/1287816366123909133/0VEcUTlumPJEJvrBQCrnlxwhG60pM0OIYW8vtyubLnL3bS6tzWTrVhXH3HWyezlCs_4y
    FIXTURE_INITIALIZE_DELAY: 200
    NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        source-url: https://nuget.pkg.github.com/gamezzigae/index.json
        
        
    - name: Set up Docker Compose
      run: sudo apt-get install docker-compose

    - name : Run Docker Images
      run: docker-compose -f ./docker-compose.yml up -d

    - name: Restore
      run: dotnet restore ./src

    - name: Build
      run: dotnet build ./src --configuration Release --no-restore

    - name: Test
      run: dotnet test ./src --configuration Release --no-restore

    - name: Pack (no build)
      run: dotnet pack ./src/Gzzz.Server.Shared/Gzzz.Server.Shared.csproj --configuration Release --no-build --output ./nupkg

    - name: Push to NuGet
      run: dotnet nuget push ./**/*.nupkg --skip-duplicate --no-symbols true --api-key ${{ secrets.GITHUB_TOKEN }}
